version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./orbit.db:/app/orbit.db
    environment:
      - ORBIT_DB_PATH=sqlite+aiosqlite:////app/orbit.db
    extra_hosts:
      - "host.docker.internal:host-gateway"  # allows backend to reach host Ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
